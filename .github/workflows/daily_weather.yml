name: Daily Weather Report

on:
  schedule:
    # Türkiye saati (TSİ - UTC+3) ile sabah 06:00'da çalışması için UTC karşılığı olan 03:00'ı veriyoruz.
    - cron: '0 3 * * *'
  workflow_dispatch: # Bu satır sayesinde workflow'u GitHub arayüzünden manuel olarak da tetikleyebilirsiniz.

jobs:
  run-weather-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Uygulamamızın ihtiyaç duyduğu kütüphaneleri kuruyoruz
        pip install requests instagrapi

    - name: Run weather bot
      env:
        # Python koduna hassas bilgileri aktarıyoruz
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        INSTAGRAM_GROUP_ID: ${{ secrets.INSTAGRAM_GROUP_ID }}
      run: |
        python main.py
